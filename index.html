<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>砚 Inkwell — 博客系统</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600&family=Noto+Sans+SC:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/tokens.css">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="api.js"></script>

  <script type="text/babel" src="components/shared.jsx"></script>
  <script type="text/babel" src="components/page-auth.jsx"></script>
  <script type="text/babel" src="components/page-home.jsx"></script>
  <script type="text/babel" src="components/page-article.jsx"></script>
  <script type="text/babel" src="components/page-ranking.jsx"></script>
  <script type="text/babel" src="components/page-profile.jsx"></script>
  <script type="text/babel" src="components/page-author.jsx"></script>
  <script type="text/babel" src="components/page-about.jsx"></script>
  <script type="text/babel" src="components/page-admin-dash.jsx"></script>
  <script type="text/babel" src="components/page-admin-articles.jsx"></script>
  <script type="text/babel" src="components/page-admin-users.jsx"></script>
  <script type="text/babel" src="components/page-admin-editor.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    const DEFAULT_THEME = {
      theme: 'light',
      font: 'serif',
      accent: 'terracotta',
      density: 'loose',
      texture: 'solid',
    };

    const PROTECTED_PAGES = ['admin', 'admin-articles', 'admin-editor', 'admin-users'];

    const readInitialRoute = () => {
      const params = new URLSearchParams(location.search);
      return {
        page: params.get('page') || localStorage.getItem('inkwell.page') || 'home',
        articleId: params.get('id') || localStorage.getItem('inkwell.currentArticleId') || null,
        authorHandle: params.get('handle') || localStorage.getItem('inkwell.currentAuthorHandle') || null,
      };
    };

    function App() {
      const initialRoute = readInitialRoute();
      const [page, _setPage] = useState(initialRoute.page);
      const [currentArticleId, setCurrentArticleId] = useState(initialRoute.articleId);
      const [currentAuthorHandle, setCurrentAuthorHandle] = useState(initialRoute.authorHandle);
      const [authedUser, setAuthedUser] = useState(() => window.Auth?.user || null);
      const [tweaks, setTweaks] = useState(() => {
        try {
          const raw = localStorage.getItem('inkwell.tweaks');
          return raw ? { ...DEFAULT_THEME, ...JSON.parse(raw) } : DEFAULT_THEME;
        } catch {
          return DEFAULT_THEME;
        }
      });
      const [tweaksOpen, setTweaksOpen] = useState(false);

      const setPage = (next, value) => {
        if (next === 'article') {
          setCurrentArticleId(value || null);
        } else if (next === 'admin-editor' && value !== undefined) {
          setCurrentArticleId(value || null);
        } else if (next === 'author') {
          setCurrentAuthorHandle(value || null);
        }
        _setPage(next);
      };

      useEffect(() => {
        const params = new URLSearchParams(location.search);
        const oauthStatus = params.get('oauth');
        const hashTokenMatch = location.hash.match(/token=([^&]+)/);

        if (oauthStatus === 'success' && hashTokenMatch) {
          const token = decodeURIComponent(hashTokenMatch[1]);
          window.Auth?.adoptToken(token).then((u) => {
            setAuthedUser(u || null);
            history.replaceState(null, '', location.pathname);
            _setPage('home');
          });
        } else if (oauthStatus === 'error') {
          alert('第三方登录失败:' + (params.get('message') || '未知错误'));
          history.replaceState(null, '', location.pathname);
        }

        window.Auth?.refresh().then((u) => setAuthedUser(u || null));
        const off = window.Auth?.onChange((u) => setAuthedUser(u));
        return () => { try { off && off(); } catch {} };
      }, []);

      useEffect(() => {
        if (!authedUser && PROTECTED_PAGES.includes(page)) _setPage('auth');
        if (page === 'admin-users' && authedUser && authedUser.role !== 'ADMIN') _setPage('admin');
      }, [authedUser, page]);

      useEffect(() => {
        const root = document.documentElement;
        root.setAttribute('data-theme', tweaks.theme);
        root.setAttribute('data-font', tweaks.font);
        root.setAttribute('data-accent', tweaks.accent === 'terracotta' ? '' : tweaks.accent);
        root.setAttribute('data-density', tweaks.density);
        root.setAttribute('data-texture', tweaks.texture);
        try { localStorage.setItem('inkwell.tweaks', JSON.stringify(tweaks)); } catch {}
      }, [tweaks]);

      useEffect(() => {
        try {
          localStorage.setItem('inkwell.page', page);
          if (currentArticleId) localStorage.setItem('inkwell.currentArticleId', currentArticleId);
          else localStorage.removeItem('inkwell.currentArticleId');
          if (currentAuthorHandle) localStorage.setItem('inkwell.currentAuthorHandle', currentAuthorHandle);
          else localStorage.removeItem('inkwell.currentAuthorHandle');
        } catch {}

        const params = new URLSearchParams();
        if (page !== 'home') params.set('page', page);
        if ((page === 'article' || page === 'admin-editor') && currentArticleId) params.set('id', currentArticleId);
        if (page === 'author' && currentAuthorHandle) params.set('handle', currentAuthorHandle);
        const nextUrl = params.toString() ? `${location.pathname}?${params.toString()}` : location.pathname;
        history.replaceState(null, '', nextUrl);
        window.scrollTo(0, 0);
      }, [page, currentArticleId, currentAuthorHandle]);

      const setPart = (patch) => {
        setTweaks((prev) => ({ ...prev, ...patch }));
      };

      const pages = {
        auth: <PageAuth onNav={setPage}/>,
        home: <PageHome onNav={setPage} tweaks={tweaks} user={authedUser}/>,
        article: <PageArticle onNav={setPage} articleId={currentArticleId} user={authedUser}/>,
        ranking: <PageRanking onNav={setPage} user={authedUser}/>,
        profile: <PageProfile onNav={setPage} user={authedUser}/>,
        author: <PageAuthor onNav={setPage} user={authedUser} authorHandle={currentAuthorHandle}/>,
        about: <PageAbout onNav={setPage} user={authedUser}/>,
        admin: <PageAdminDashboard onNav={setPage} user={authedUser}/>,
        'admin-articles': <PageAdminArticles onNav={setPage} user={authedUser}/>,
        'admin-editor': <PageAdminEditor onNav={setPage} user={authedUser} articleId={currentArticleId}/>,
        'admin-users': <PageAdminUsers onNav={setPage} user={authedUser}/>,
      };

      return (
        <div data-screen-label={page}>
          <PageTransition pageKey={page}>
            {pages[page] || pages.home}
          </PageTransition>
          <FloatingDock
            page={page}
            user={authedUser}
            setPage={setPage}
            tweaksOpen={tweaksOpen}
            openTweaks={() => setTweaksOpen((v) => !v)}
          />
          {tweaksOpen && (
            <TweaksPanel
              state={tweaks}
              set={setPart}
              visible
              onClose={() => setTweaksOpen(false)}
            />
          )}
        </div>
      );
    }

    function FloatingDock({ page, user, setPage, tweaksOpen, openTweaks }) {
      const dockRef = useRef(null);
      const dragRef = useRef(null);
      const SNAP_DISTANCE = 28;
      const [open, setOpen] = useState(false);
      const [hover, setHover] = useState(false);
      const [position, setPosition] = useState(() => {
        try {
          const raw = localStorage.getItem('inkwell.dock.position');
          return raw ? JSON.parse(raw) : null;
        } catch {
          return null;
        }
      });

      const items = useMemo(() => {
        const base = user ? [
          { k: 'home', l: '首页', le: 'Home' },
          { k: 'ranking', l: '榜单', le: 'Rank' },
          { k: 'profile', l: '书房', le: 'Study' },
          { k: 'author', l: '主页', le: 'Profile', payload: user.handle },
          { k: 'admin', l: '后台', le: 'Studio' },
          { k: 'admin-articles', l: '管理', le: 'Posts' },
          { k: 'admin-editor', l: '写作', le: 'Write', payload: null },
        ] : [
          { k: 'auth', l: '登录', le: 'Auth' },
          { k: 'home', l: '首页', le: 'Home' },
          { k: 'ranking', l: '榜单', le: 'Rank' },
        ];
        if (user && user.role === 'ADMIN') base.push({ k: 'admin-users', l: '平台', le: 'Admin' });
        return base;
      }, [user]);

      const current = items.find((item) => item.k === page) || { l: '关于', le: 'About' };

      const getDockMetrics = () => {
        const rect = dockRef.current?.getBoundingClientRect();
        return {
          width: rect?.width || 240,
          height: rect?.height || 50,
        };
      };

      const clampPosition = (next) => {
        const { width, height } = getDockMetrics();
        return {
          x: Math.min(Math.max(0, next.x), window.innerWidth - width),
          y: Math.min(Math.max(0, next.y), window.innerHeight - height),
        };
      };

      const snapPosition = (next) => {
        const { width, height } = getDockMetrics();
        const maxX = window.innerWidth - width;
        const maxY = window.innerHeight - height;
        const snapped = clampPosition(next);

        if (snapped.x <= SNAP_DISTANCE) snapped.x = 0;
        if (maxX - snapped.x <= SNAP_DISTANCE) snapped.x = maxX;
        if (snapped.y <= SNAP_DISTANCE) snapped.y = 0;
        if (maxY - snapped.y <= SNAP_DISTANCE) snapped.y = maxY;

        return snapped;
      };

      useEffect(() => {
        if (!dockRef.current) return;

        const rect = dockRef.current.getBoundingClientRect();
        const fallback = {
          x: Math.max(16, window.innerWidth - rect.width - 24),
          y: Math.max(16, window.innerHeight - rect.height - 24),
        };

        setPosition((prev) => snapPosition(prev || fallback));
      }, []);

      useEffect(() => {
        if (!position) return;
        try { localStorage.setItem('inkwell.dock.position', JSON.stringify(position)); } catch {}
      }, [position]);

      useEffect(() => {
        const onMove = (event) => {
          if (!dragRef.current) return;
          event.preventDefault();
          setPosition(clampPosition({
            x: event.clientX - dragRef.current.dx,
            y: event.clientY - dragRef.current.dy,
          }));
        };

        const onUp = () => {
          if (dragRef.current) {
            setPosition((prev) => prev ? snapPosition(prev) : prev);
          }
          dragRef.current = null;
        };

        const onResize = () => {
          setPosition((prev) => prev ? snapPosition(prev) : prev);
        };

        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
        window.addEventListener('resize', onResize);
        return () => {
          window.removeEventListener('pointermove', onMove);
          window.removeEventListener('pointerup', onUp);
          window.removeEventListener('resize', onResize);
        };
      }, []);

      const onGripDown = (event) => {
        if (!position) return;
        event.preventDefault();
        setOpen(false);
        dragRef.current = {
          dx: event.clientX - position.x,
          dy: event.clientY - position.y,
        };
      };

      if (!position) {
        return <div ref={dockRef} style={{ position: 'fixed', right: 24, bottom: 24, opacity: 0, pointerEvents: 'none' }}/>;
      }

      return (
        <>
          {open && (
            <div onClick={()=>setOpen(false)} style={{ position: 'fixed', inset: 0, zIndex: 70, background: 'transparent' }}/>
          )}
          <div
            style={{
              position: 'fixed',
              left: position.x,
              top: position.y,
              zIndex: 80,
            }}>
            <div style={{
              position: 'absolute',
              right: 0,
              bottom: 'calc(100% + 10px)',
              display: 'flex',
              gap: 4,
              padding: 6,
              background: 'rgba(253, 251, 246, 0.86)',
              backdropFilter: 'blur(16px) saturate(1.2)',
              WebkitBackdropFilter: 'blur(16px) saturate(1.2)',
              border: '1px solid var(--border)',
              borderRadius: 999,
              boxShadow: '0 10px 40px rgba(42,38,34,0.10), 0 2px 6px rgba(42,38,34,0.04)',
              opacity: open ? 1 : 0,
              transform: open ? 'translateY(0) scale(1)' : 'translateY(8px) scale(0.96)',
              transformOrigin: '100% 100%',
              pointerEvents: open ? 'auto' : 'none',
              transition: 'opacity 280ms var(--ease-out), transform 320ms var(--ease-spring)',
              whiteSpace: 'nowrap',
            }}>
              {items.map((item, index) => {
                const active = item.k === page;
                return (
                  <button
                    key={item.k}
                    onClick={() => { setPage(item.k, item.payload); setOpen(false); }}
                    style={{
                      padding: '7px 14px',
                      background: active ? 'var(--ink)' : 'transparent',
                      color: active ? 'var(--paper)' : 'var(--ink-3)',
                      border: 'none',
                      borderRadius: 999,
                      cursor: 'pointer',
                      fontFamily: 'inherit',
                      fontSize: 12,
                      fontWeight: active ? 500 : 400,
                      display: 'inline-flex',
                      alignItems: 'baseline',
                      gap: 5,
                      opacity: open ? 1 : 0,
                      transform: open ? 'translateY(0)' : 'translateY(4px)',
                      transition: `all var(--d-fast) var(--ease-out), opacity 240ms ease, transform 280ms var(--ease-spring)`,
                      transitionDelay: open ? `${index * 22}ms` : '0ms',
                    }}>
                    {item.l}
                    <span style={{ fontFamily: 'var(--serif)', fontStyle: 'italic', fontSize: 10, opacity: 0.55 }}>{item.le}</span>
                  </button>
                );
              })}
              <div style={{ width: 1, background: 'var(--border)', margin: '4px 4px' }}/>
              <button
                onClick={() => { setPage('about'); setOpen(false); }}
                style={{
                  padding: '7px 12px',
                  background: page === 'about' ? 'var(--accent-wash)' : 'transparent',
                  color: page === 'about' ? 'var(--accent-deep)' : 'var(--accent)',
                  border: 'none',
                  borderRadius: 999,
                  cursor: 'pointer',
                  fontFamily: 'inherit',
                  fontSize: 12,
                  display: 'inline-flex',
                  alignItems: 'center',
                }}>
                关于
              </button>
            </div>

            <div
              ref={dockRef}
              onMouseEnter={()=>setHover(true)}
              onMouseLeave={()=>setHover(false)}
              style={{
                display: 'flex',
                alignItems: 'center',
                gap: 2,
                padding: 4,
                background: 'rgba(253, 251, 246, 0.82)',
                backdropFilter: 'blur(16px) saturate(1.2)',
                WebkitBackdropFilter: 'blur(16px) saturate(1.2)',
                border: '1px solid var(--border)',
                borderRadius: 999,
                boxShadow: hover
                  ? '0 8px 28px rgba(42,38,34,0.12), 0 2px 6px rgba(42,38,34,0.05)'
                  : '0 2px 10px rgba(42,38,34,0.06), 0 1px 2px rgba(42,38,34,0.03)',
                transition: 'box-shadow var(--d-base) var(--ease-out)',
              }}>
              <button
                onPointerDown={onGripDown}
                title="拖拽移动"
                style={{
                  display: 'inline-flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  width: 30,
                  height: 30,
                  border: 'none',
                  borderRadius: 999,
                  background: 'transparent',
                  cursor: 'grab',
                }}>
                <span style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 3px)', gap: 4 }}>
                  {[0, 1, 2, 3, 4, 5].map((dot) => (
                    <span key={dot} style={{ width: 3, height: 3, borderRadius: '50%', background: 'var(--ink-4)' }}/>
                  ))}
                </span>
              </button>

              <button
                onClick={()=>setOpen((v)=>!v)}
                style={{
                  display: 'inline-flex',
                  alignItems: 'center',
                  gap: 8,
                  padding: '7px 14px 7px 12px',
                  background: open ? 'var(--paper-2)' : 'transparent',
                  border: 'none',
                  borderRadius: 999,
                  cursor: 'pointer',
                  fontFamily: 'inherit',
                  fontSize: 12,
                  color: 'var(--ink-2)',
                }}>
                <span style={{
                  width: 6,
                  height: 6,
                  borderRadius: '50%',
                  background: 'var(--accent)',
                  boxShadow: '0 0 0 3px var(--accent-wash)',
                }}/>
                <span style={{ fontWeight: 500, color: 'var(--ink)' }}>{current.l}</span>
                <span style={{ fontFamily: 'var(--serif)', fontStyle: 'italic', color: 'var(--ink-4)', fontSize: 11 }}>{current.le}</span>
                <span style={{
                  display: 'inline-flex',
                  marginLeft: 2,
                  color: 'var(--ink-4)',
                  transition: 'transform 280ms var(--ease-spring)',
                  transform: open ? 'rotate(180deg)' : 'rotate(0deg)',
                }}>
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M18 15l-6-6-6 6"/>
                  </svg>
                </span>
              </button>

              <div style={{ width: 1, height: 16, background: 'var(--border)' }}/>

              <button
                onClick={openTweaks}
                style={{
                  display: 'inline-flex',
                  alignItems: 'center',
                  gap: 6,
                  padding: '7px 12px',
                  background: tweaksOpen ? 'var(--accent-wash)' : 'transparent',
                  color: tweaksOpen ? 'var(--accent-deep)' : 'var(--ink-3)',
                  border: 'none',
                  borderRadius: 999,
                  cursor: 'pointer',
                  fontFamily: 'inherit',
                  fontSize: 12,
                }}>
                <span style={{
                  display: 'inline-flex',
                  transition: 'transform 420ms var(--ease-spring)',
                  transform: tweaksOpen ? 'rotate(90deg)' : 'rotate(0deg)',
                }}>
                  <Icon name="settings" size={13}/>
                </span>
                调校
              </button>
            </div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
